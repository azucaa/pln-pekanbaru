services:
  - type: web
    name: pln-pekanbaru
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pln-pekanbaru-db
          property: connectionString
      - key: SITE_URL
        sync: false
      - key: APP_ENV
        value: production

databases:
  - name: pln-pekanbaru-db
    plan: free
    databaseName: pln_pekanbaru
    ipAllowList: []
